<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ENGRAM – 英語学習アプリ</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>body{margin:0;padding:0;}*{box-sizing:border-box;}</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback } = React;

const G = `
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@500;700;900&family=Nunito:wght@700;800;900&display=swap');
  @keyframes pop    {0%{transform:scale(.85);opacity:0}65%{transform:scale(1.05)}100%{transform:scale(1);opacity:1}}
  @keyframes shake  {0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}
  @keyframes fadeUp {from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
  @keyframes bounce {0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
  @keyframes pulse  {0%,100%{opacity:1}50%{opacity:.6}}
  .pop{animation:pop .35s cubic-bezier(.34,1.56,.64,1) both}
  .shake{animation:shake .55s ease both}
  .fadeUp{animation:fadeUp .3s ease both}
  .bounce{animation:bounce 1.8s ease infinite}
  .pulse{animation:pulse 2s ease infinite}
  button:active{transform:scale(.97)}
  ::-webkit-scrollbar{width:4px}
  ::-webkit-scrollbar-thumb{background:rgba(255,255,255,.25);border-radius:99px}
`;
const F="'Noto Sans JP','Nunito',sans-serif";
const SK={mistakes:"engram_v4_mistakes",history:"engram_history_v2",wordProg:"engram_word_progress"};
const REVIEW_MS=72*3600*1000;
const OC=["#3B82F6","#10B981","#F59E0B","#EF4444"];
const OL=["A","B","C","D"];
const CB=["#FFFDE7","#E3F2FD","#F3E5F5","#E8F5E9","#FCE4EC","#FFF8E1","#E8EAF6","#E0F2F1"];

const UM={
  "単元1": {label:"単元1",title:"be動詞と一般動詞",emoji:"⚡",color:"#4F46E5",bg:"#EEF2FF",genres:["一般動詞","be動詞"],levelDesc:{Lv1:"肯定文",Lv2:"否定・疑問文",Lv3:"応用・混合"}},
  "単元2": {label:"単元2",title:"命令文",emoji:"📢",color:"#059669",bg:"#ECFDF5",genres:["命令文"],levelDesc:{Lv1:"肯定の命令文",Lv2:"Don't・Please",Lv3:"be動詞命令文"}},
  "単元3": {label:"単元3",title:"過去形",emoji:"⏰",color:"#B45309",bg:"#FEF3C7",genres:["過去形"],levelDesc:{Lv1:"過去形・肯定文",Lv2:"過去形・否定文",Lv3:"過去形・疑問文"}},
  "単元4": {label:"単元4",title:"過去進行形",emoji:"🎬",color:"#7C3AED",bg:"#EDE9FE",genres:["過去進行形"],levelDesc:{Lv1:"肯定文",Lv2:"否定文",Lv3:"疑問文"}},
  "単元5": {label:"単元5",title:"未来形",emoji:"🚀",color:"#0284C7",bg:"#E0F2FE",genres:["未来形"],levelDesc:{Lv1:"will・肯定文",Lv2:"be going to",Lv3:"否定・疑問文"}},
  "単元6": {label:"単元6",title:"There is/are",emoji:"📍",color:"#0F766E",bg:"#CCFBF1",genres:["There is/are"],levelDesc:{Lv1:"肯定文",Lv2:"否定文",Lv3:"疑問文"}},
  "単元7": {label:"単元7",title:"助動詞",emoji:"🛡️",color:"#0F766E",bg:"#CCFBF1",genres:["助動詞"],levelDesc:{Lv1:"must・may",Lv2:"have to",Lv3:"should"}},
  "まとめ":{label:"まとめ",title:"単元1〜7 総復習",emoji:"🎯",color:"#6D28D9",bg:"#EDE9FE",genres:["まとめ"],levelDesc:{Lv1:"be動詞・一般動詞",Lv2:"過去・進行・未来",Lv3:"There is・助動詞"}},
  "単元8": {label:"単元8",title:"〜すること",emoji:"📌",color:"#C2410C",bg:"#FFEDD5",genres:["不定詞・動名詞"],levelDesc:{Lv1:"to不定詞",Lv2:"動名詞",Lv3:"前置詞＋動名詞"}},
  "単元9": {label:"単元9",title:"不定詞の応用",emoji:"🎯",color:"#4D7C0F",bg:"#ECFCCB",genres:["不定詞の応用"],levelDesc:{Lv1:"目的「〜するために」",Lv2:"感情の原因",Lv3:"名詞修飾"}},
  "単元10":{label:"単元10",title:"比較級・最上級",emoji:"⚖️",color:"#1D4ED8",bg:"#DBEAFE",genres:["比較級・最上級"],levelDesc:{Lv1:"比較級（er+than）",Lv2:"最上級（the+est）",Lv3:"不規則変化"}},
  "単元11":{label:"単元11",title:"比較の応用",emoji:"🔃",color:"#6D28D9",bg:"#EDE9FE",genres:["比較の応用"],levelDesc:{Lv1:"more/most比較",Lv2:"as...as同等比較",Lv3:"like better/best"}},
  "単元12":{label:"単元12",title:"SVOO・感覚動詞",emoji:"🔗",color:"#0E7490",bg:"#CFFAFE",genres:["SVOO・感覚動詞"],levelDesc:{Lv1:"第4文型",Lv2:"to・for書き換え",Lv3:"感覚動詞+形容詞"}},
  "単元13":{label:"単元13",title:"接続詞",emoji:"🔗",color:"#9A3412",bg:"#FFEDD5",genres:["接続詞"],levelDesc:{Lv1:"when・because",Lv2:"if（条件）",Lv3:"that・before・after"}},
  "単元14":{label:"単元14",title:"代名詞",emoji:"👤",color:"#6D28D9",bg:"#EDE9FE",genres:["代名詞"],levelDesc:{Lv1:"主格・所有格・目的格",Lv2:"所有代名詞",Lv3:"-thing系代名詞"}},
};
const GM={
  "一般動詞":{color:"#4F46E5",bg:"#EEF2FF",emoji:"🏃"},
  "be動詞":{color:"#D97706",bg:"#FFF7ED",emoji:"🔵"},
  "命令文":{color:"#059669",bg:"#ECFDF5",emoji:"📢"},
  "過去形":{color:"#B45309",bg:"#FEF3C7",emoji:"⏰"},
  "過去進行形":{color:"#7C3AED",bg:"#EDE9FE",emoji:"🎬"},
  "未来形":{color:"#0284C7",bg:"#E0F2FE",emoji:"🚀"},
  "There is/are":{color:"#0F766E",bg:"#CCFBF1",emoji:"📍"},
  "助動詞":{color:"#0F766E",bg:"#CCFBF1",emoji:"🛡️"},
  "まとめ":{color:"#6D28D9",bg:"#EDE9FE",emoji:"🎯"},
  "不定詞・動名詞":{color:"#C2410C",bg:"#FFEDD5",emoji:"📌"},
  "不定詞の応用":{color:"#4D7C0F",bg:"#ECFCCB",emoji:"🎯"},
  "比較級・最上級":{color:"#1D4ED8",bg:"#DBEAFE",emoji:"⚖️"},
  "比較の応用":{color:"#6D28D9",bg:"#EDE9FE",emoji:"🔃"},
  "SVOO・感覚動詞":{color:"#0E7490",bg:"#CFFAFE",emoji:"🔗"},
  "接続詞":{color:"#9A3412",bg:"#FFEDD5",emoji:"🔗"},
  "代名詞":{color:"#6D28D9",bg:"#EDE9FE",emoji:"👤"},
};
const LM={Lv1:{label:"Lv 1",color:"#059669",bg:"#D1FAE5"},Lv2:{label:"Lv 2",color:"#2563EB",bg:"#DBEAFE"},Lv3:{label:"Lv 3",color:"#DC2626",bg:"#FEE2E2"}};
const PT=[
  {subj:"I",poss:"my",obj:"me",pp:"mine",label:"私"},
  {subj:"You",poss:"your",obj:"you",pp:"yours",label:"あなた"},
  {subj:"He",poss:"his",obj:"him",pp:"his",label:"彼"},
  {subj:"She",poss:"her",obj:"her",pp:"hers",label:"彼女"},
  {subj:"It",poss:"its",obj:"it",pp:"—",label:"それ"},
  {subj:"We",poss:"our",obj:"us",pp:"ours",label:"私たち"},
  {subj:"They",poss:"their",obj:"them",pp:"theirs",label:"彼ら"},
];
const WM=[
  {key:"en2ja",label:"英語→日本語",emoji:"🇺🇸",desc:"英単語を見て日本語を4択で答える",color:"#3B82F6"},
  {key:"ja2en",label:"日本語→英語",emoji:"🇯🇵",desc:"日本語を見て英単語を4択で答える",color:"#8B5CF6"},
  {key:"spell",label:"スペルチェック",emoji:"⌨️",desc:"日本語を見て英単語をキーボードで入力する",color:"#DC2626"},
];

function shuf(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
function sLS(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}
function lLS(k,d){try{const r=localStorage.getItem(k);return r?JSON.parse(r):d;}catch{return d;}}
function parseExp(text){
  const r={},fi=text.indexOf("❌");
  r._correct=fi>=0?text.slice(0,fi).trim():text.trim();
  text.split("❌").slice(1).forEach(b=>{b=b.trim();const ai=b.indexOf("→");if(ai>=0)r[b.slice(0,ai).trim()]=b.slice(ai+1).trim();});
  return r;
}

/* ── Root ── */
function App({fillBank,sortBank,wordBank}){
  const [sc,setSc]=useState("main");
  const [hist,setHist]=useState(()=>lLS(SK.history,[]));
  const [fmist,setFmist]=useState(()=>lLS(SK.mistakes,{}));
  const [wprog,setWprog]=useState(()=>lLS(SK.wordProg,{}));
  const addHist=useCallback(e=>{setHist(p=>{const n=[{...e,ts:Date.now()},...p].slice(0,300);sLS(SK.history,n);return n;});},[]);
  const saveMist=useCallback(l=>{setFmist(l);sLS(SK.mistakes,l);},[]);
  const saveWP=useCallback(p=>{setWprog(p);sLS(SK.wordProg,p);},[]);
  if(sc==="fill")    return <FillQuiz bank={fillBank} mist={fmist} setMist={saveMist} addHist={addHist} back={()=>setSc("main")}/>;
  if(sc==="sort")    return <SortQuiz bank={sortBank} addHist={addHist} back={()=>setSc("main")}/>;
  if(sc==="word")    return <WordQuiz bank={wordBank} wp={wprog} saveWP={saveWP} addHist={addHist} back={()=>setSc("main")}/>;
  if(sc==="history") return <HistScreen hist={hist} fillBank={fillBank} fmist={fmist} back={()=>setSc("main")}/>;
  return <MainMenu onSel={setSc} hist={hist} fmist={fmist}/>;
}

/* ── Main Menu ── */
function MainMenu({onSel,hist,fmist}){
  const rc=Object.entries(fmist).filter(([,ts])=>Date.now()-ts>=REVIEW_MS).length;
  const tq=hist.reduce((s,h)=>s+(h.total||0),0),tc=hist.reduce((s,h)=>s+(h.correct||0),0);
  const MODES=[
    {key:"fill",emoji:"✏️",label:"穴埋め問題",desc:"空欄に入る英語を4択から選ぼう",color:"#6366F1",g:"135deg,#6366F1,#8B5CF6"},
    {key:"sort",emoji:"🔀",label:"並べ替え問題",desc:"日本語を見て英単語を正しい順に並べよう",color:"#059669",g:"135deg,#059669,#10B981"},
    {key:"word",emoji:"📖",label:"単語問題",desc:"英単語・日本語・スペルをマスターしよう",color:"#DC2626",g:"135deg,#DC2626,#F59E0B"},
  ];
  return(
    <div style={{minHeight:"100vh",background:"linear-gradient(160deg,#0F0C29,#302B63,#24243E)",fontFamily:F,padding:"20px 16px 44px",overflowY:"auto"}}>
      <style>{G}</style>
      <div style={{maxWidth:480,margin:"0 auto"}}>
        <div className="pop" style={{textAlign:"center",padding:"26px 0 20px"}}>
          <div style={{fontSize:52}} className="bounce">📚</div>
          <h1 style={{fontFamily:"'Nunito',sans-serif",fontWeight:900,fontSize:38,color:"#fff",margin:"6px 0 0",letterSpacing:"-1px"}}>ENG<span style={{color:"#FFD600"}}>GRAM</span></h1>
          <p style={{color:"rgba(255,255,255,.4)",fontSize:12,fontWeight:700,margin:"5px 0 0"}}>英語学習トレーニングアプリ</p>
        </div>
        {tq>0&&(
          <div className="fadeUp" style={{background:"rgba(255,255,255,.07)",border:"1px solid rgba(255,255,255,.09)",borderRadius:16,padding:"12px 0",marginBottom:14,display:"flex"}}>
            {[{l:"総問題数",v:tq+"問"},{l:"正解数",v:tc+"問"},{l:"正答率",v:tq?Math.round(tc/tq*100)+"%":"—"}].map((s,i)=>(
              <div key={i} style={{flex:1,textAlign:"center",borderRight:i<2?"1px solid rgba(255,255,255,.08)":"none"}}>
                <div style={{color:"#FFD600",fontWeight:900,fontSize:18,fontFamily:"'Nunito',sans-serif"}}>{s.v}</div>
                <div style={{color:"rgba(255,255,255,.4)",fontSize:10,fontWeight:700}}>{s.l}</div>
              </div>
            ))}
          </div>
        )}
        {rc>0&&(
          <button onClick={()=>onSel("fill")} className="pulse"
            style={{width:"100%",background:"linear-gradient(90deg,#F59E0B,#EF4444)",border:"none",borderRadius:16,padding:"11px 16px",marginBottom:12,cursor:"pointer",display:"flex",alignItems:"center",gap:11,boxShadow:"0 6px 20px rgba(239,68,68,.4)",fontFamily:F}}>
            <span style={{fontSize:26}}>🔁</span>
            <div style={{textAlign:"left"}}>
              <p style={{color:"#fff",fontWeight:900,fontSize:13,margin:0}}>復習モードで練習しよう！</p>
              <p style={{color:"rgba(255,255,255,.85)",fontSize:11,fontWeight:700,margin:"2px 0 0"}}>{rc}問が復習待ちです（72時間経過）</p>
            </div>
            <span style={{marginLeft:"auto",color:"#fff",fontSize:20}}>›</span>
          </button>
        )}
        <div style={{display:"flex",flexDirection:"column",gap:11,marginBottom:12}}>
          {MODES.map((m,i)=>(
            <button key={m.key} className="fadeUp" onClick={()=>onSel(m.key)}
              style={{animationDelay:`${i*70}ms`,background:"rgba(255,255,255,.055)",border:"1px solid rgba(255,255,255,.09)",borderRadius:20,padding:"16px 17px",cursor:"pointer",display:"flex",alignItems:"center",gap:14,fontFamily:F,width:"100%",textAlign:"left"}}>
              <div style={{width:50,height:50,borderRadius:14,background:`linear-gradient(${m.g})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,flexShrink:0,boxShadow:`0 4px 14px ${m.color}55`}}>{m.emoji}</div>
              <div style={{flex:1}}>
                <p style={{color:"#fff",fontWeight:900,fontSize:16,margin:"0 0 2px",fontFamily:"'Nunito',sans-serif"}}>{m.label}</p>
                <p style={{color:"rgba(255,255,255,.45)",fontSize:11,fontWeight:700,margin:0}}>{m.desc}</p>
              </div>
              <span style={{color:m.color,fontSize:22}}>›</span>
            </button>
          ))}
        </div>
        <button onClick={()=>onSel("history")}
          style={{width:"100%",background:"rgba(255,255,255,.055)",border:"1px solid rgba(255,255,255,.1)",borderRadius:14,padding:"12px 0",cursor:"pointer",color:"rgba(255,255,255,.6)",fontWeight:900,fontSize:13,fontFamily:F,display:"flex",alignItems:"center",justifyContent:"center",gap:7}}>
          📊 学習履歴・達成度を見る
        </button>
      </div>
    </div>
  );
}

/* ── History ── */
function HistScreen({hist,fillBank,fmist,back}){
  const [tab,setTab]=useState("summary");
  const MC={fill:"#6366F1",sort:"#059669",word:"#DC2626"};
  const ML={fill:"✏️ 穴埋め",sort:"🔀 並べ替え",word:"📖 単語"};
  const bm={};hist.forEach(h=>{if(!bm[h.mode])bm[h.mode]={total:0,correct:0,sess:0};bm[h.mode].total+=h.total||0;bm[h.mode].correct+=h.correct||0;bm[h.mode].sess+=1;});
  const bu={};hist.filter(h=>h.mode==="fill"&&h.label).forEach(h=>{if(!bu[h.label])bu[h.label]={total:0,correct:0};bu[h.label].total+=h.total||0;bu[h.label].correct+=h.correct||0;});
  const days=Array.from({length:7},(_,i)=>{
    const d=new Date();d.setDate(d.getDate()-(6-i));
    const k=`${d.getMonth()+1}/${d.getDate()}`;
    const dh=hist.filter(h=>{const hd=new Date(h.ts);return `${hd.getMonth()+1}/${hd.getDate()}`===k;});
    return{k,total:dh.reduce((s,h)=>s+(h.total||0),0),correct:dh.reduce((s,h)=>s+(h.correct||0),0)};
  });
  const mx=Math.max(...days.map(d=>d.total),1);
  const mids=Object.keys(fmist);
  const mqs=fillBank.filter(q=>mids.includes(q.id));
  const rw=mqs.filter(q=>Date.now()-fmist[q.id]>=REVIEW_MS);
  return(
    <div style={{minHeight:"100vh",background:"linear-gradient(160deg,#0F0C29,#302B63,#24243E)",fontFamily:F,padding:"16px 16px 44px",overflowY:"auto"}}>
      <style>{G}</style>
      <div style={{maxWidth:480,margin:"0 auto"}}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16}}>
          <button onClick={back} style={{background:"rgba(255,255,255,.1)",border:"none",color:"#fff",fontWeight:900,fontSize:12,padding:"6px 12px",borderRadius:99,cursor:"pointer",fontFamily:F}}>← 戻る</button>
          <h2 style={{color:"#fff",fontWeight:900,fontSize:19,margin:0,fontFamily:"'Nunito',sans-serif"}}>📊 学習履歴</h2>
        </div>
        <div style={{display:"flex",gap:5,marginBottom:14,background:"rgba(255,255,255,.07)",borderRadius:13,padding:3}}>
          {[["summary","まとめ"],["unit","単元達成度"],["daily","日別"],["mistakes","間違い"]].map(([k,l])=>(
            <button key={k} onClick={()=>setTab(k)}
              style={{flex:1,background:tab===k?"#fff":"transparent",color:tab===k?"#1F2937":"rgba(255,255,255,.5)",fontWeight:900,fontSize:11,padding:"7px 0",borderRadius:9,border:"none",cursor:"pointer",fontFamily:F}}>{l}</button>
          ))}
        </div>
        {tab==="summary"&&(
          <div className="fadeUp">
            {hist.length===0?(
              <div style={{textAlign:"center",padding:"60px 0"}}>
                <div style={{fontSize:56}}>🎯</div>
                <p style={{color:"rgba(255,255,255,.4)",fontWeight:700,fontSize:14,marginTop:12}}>まだ学習記録がありません<br/>問題を解いてみましょう！</p>
              </div>
            ):(
              <>
                <div style={{background:"rgba(255,255,255,.07)",borderRadius:16,padding:14,marginBottom:10}}>
                  <p style={{color:"rgba(255,255,255,.45)",fontWeight:900,fontSize:11,margin:"0 0 10px"}}>🌟 全体統計</p>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:7}}>
                    {[{l:"セッション",v:hist.length+"回"},{l:"総問題数",v:hist.reduce((s,h)=>s+(h.total||0),0)+"問"},{l:"総正解数",v:hist.reduce((s,h)=>s+(h.correct||0),0)+"問"}].map((s,i)=>(
                      <div key={i} style={{background:"rgba(255,255,255,.06)",borderRadius:11,padding:"11px 6px",textAlign:"center"}}>
                        <div style={{color:"#FFD600",fontWeight:900,fontSize:16,fontFamily:"'Nunito',sans-serif"}}>{s.v}</div>
                        <div style={{color:"rgba(255,255,255,.4)",fontSize:10,fontWeight:700,marginTop:2,lineHeight:1.3}}>{s.l}</div>
                      </div>
                    ))}
                  </div>
                </div>
                {Object.entries(bm).map(([mode,st])=>{
                  const pct=st.total?Math.round(st.correct/st.total*100):0,col=MC[mode]||"#6B7280";
                  return(
                    <div key={mode} style={{background:"rgba(255,255,255,.055)",border:`1px solid ${col}33`,borderRadius:14,padding:"13px 14px",marginBottom:9}}>
                      <div style={{display:"flex",alignItems:"center",marginBottom:7}}>
                        <span style={{color:"#fff",fontWeight:900,fontSize:13,flex:1}}>{ML[mode]||mode}</span>
                        <span style={{color:col,fontWeight:900,fontSize:19,fontFamily:"'Nunito',sans-serif"}}>{pct}%</span>
                      </div>
                      <div style={{height:7,background:"rgba(255,255,255,.1)",borderRadius:99,marginBottom:5}}>
                        <div style={{height:"100%",width:`${pct}%`,background:col,borderRadius:99,transition:"width 1s"}}/>
                      </div>
                      <span style={{color:"rgba(255,255,255,.35)",fontSize:10,fontWeight:700}}>{st.sess}回 / {st.correct}/{st.total}問正解</span>
                    </div>
                  );
                })}
              </>
            )}
          </div>
        )}
        {tab==="unit"&&(
          <div className="fadeUp">
            {Object.keys(bu).length===0?(
              <div style={{textAlign:"center",padding:"60px 0"}}>
                <p style={{color:"rgba(255,255,255,.4)",fontWeight:700,fontSize:13}}>穴埋め問題を解くと単元別達成度が表示されます</p>
              </div>
            ):(
              Object.entries(bu).sort(([a],[b])=>a.localeCompare(b)).map(([unit,st])=>{
                const pct=st.total?Math.round(st.correct/st.total*100):0;
                const col=pct>=80?"#10B981":pct>=60?"#F59E0B":"#EF4444";
                return(
                  <div key={unit} style={{background:"rgba(255,255,255,.055)",borderRadius:13,padding:"11px 13px",marginBottom:7}}>
                    <div style={{display:"flex",alignItems:"center",marginBottom:5}}>
                      <span style={{color:"#fff",fontWeight:900,fontSize:13,flex:1}}>{unit}</span>

        {tab==="mistakes"&&(

            {rw.length>0&&<div style={{background:"rgba(239,68,68,.15)",border:"1px solid rgba(239,68,68,.3)",borderRadius:12,padding:"9px 12px",marginBottom:10}}><p style={{color:"#FCA5A5",fontWeight:900,fontSize:12,margin:0}}>🔁 復習待ち：{rw.length}問（72時間経過済み）</p></div>}
            {mqs.length===0?(
              <div style={{textAlign:"center",padding:"60px 0"}}>

              </div>
            ):(
              <div style={{display:"flex",flexDirection:"column",gap:7}}>
                {mqs.map(q=>{
                  const ms=Date.now()-fmist[q.id],ready=ms>=REVIEW_MS,hl=Math.max(0,Math.ceil((REVIEW_MS-ms)/3600000));
                  const gm=GM[q.genre]||{};
                  return(
                    <div key={q.id} style={{background:"rgba(255,255,255,.055)",border:`1px solid ${ready?"rgba(239,68,68,.4)":"rgba(255,255,255,.07)"}`,borderRadius:13,padding:"11px 13px"}}>
                      <div style={{display:"flex",alignItems:"flex-start",gap:9}}>
                        <span style={{fontSize:20,flexShrink:0}}>{q.emoji}</span>
                        <div style={{flex:1,minWidth:0}}>
                          <p style={{color:"#fff",fontWeight:700,fontSize:12,margin:"0 0 2px",lineHeight:1.5,wordBreak:"break-word"}}>{q.sentence}</p>
                          <p style={{color:gm.color||"#6366F1",fontWeight:900,fontSize:14,margin:"0 0 5px",fontFamily:"'Nunito',sans-serif"}}>{q.english}</p>
                          <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
                            <span style={{background:gm.bg||"#EEF2FF",color:gm.color||"#4F46E5",fontSize:9,fontWeight:900,padding:"2px 7px",borderRadius:99}}>{q.genre}</span>
                            <span style={{color:ready?"#FCA5A5":"rgba(255,255,255,.3)",fontSize:9,fontWeight:700}}>{ready?"🔁 復習待ち":`⏳ あと${hl}時間`}</span>
                          </div>
                        </div>
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

/* ── Fill Quiz ── */
function FillQuiz({bank,mist,setMist,addHist,back}){
  const [sub,setSub]=useState("home");
  const [au,setAu]=useState("単元1");
  const [queue,setQueue]=useState([]);
  const [idx,setIdx]=useState(0);
  const [phase,setPhase]=useState("question");
  const [sel,setSel]=useState(null);
  const [result,setResult]=useState(null);
  const [score,setScore]=useState({c:0,t:0});
  const [showAll,setShowAll]=useState(false);
  const [shaking,setShaking]=useState(false);
  const [sg,setSg]=useState(null);
  const [sl,setSl]=useState(null);
  const [streak,setStreak]=useState(0);
  const [showPron,setShowPron]=useState(false);
  const [rm,setRm]=useState(false);
  const rc=Object.entries(mist).filter(([,ts])=>Date.now()-ts>=REVIEW_MS).length;
  const gc=(g,l)=>bank.filter(q=>q.genre===g&&q.level===l).length;
  const guc=(uk)=>{const um=UM[uk];return bank.filter(q=>um.genres.includes(q.genre)).length;};
  const start=useCallback((genre,level)=>{
    const rIds=Object.entries(mist).filter(([,ts])=>Date.now()-ts>=REVIEW_MS).map(([id])=>id);
    let pool=[...bank];if(genre)pool=pool.filter(q=>q.genre===genre);if(level)pool=pool.filter(q=>q.level===level);
    pool=shuf(pool);const rQs=pool.filter(q=>rIds.includes(q.id)),nQs=pool.filter(q=>!rIds.includes(q.id));
    setRm(rQs.length>0);setQueue(rQs.length>0?[...rQs,...nQs]:nQs);setSg(genre);setSl(level);
    setIdx(0);setScore({c:0,t:0});setPhase("question");setSel(null);setResult(null);setShowAll(false);setStreak(0);setShowPron(false);setSub("quiz");
  },[bank,mist]);
  const um=UM[au];
  if(sub==="home") return(
    <div style={{minHeight:"100vh",background:"linear-gradient(160deg,#6366F1,#8B5CF6,#EC4899)",fontFamily:F,padding:"16px 16px 32px",overflowY:"auto"}}>
      <style>{G}</style>
      <div style={{maxWidth:480,margin:"0 auto"}}>
        <div style={{display:"flex",alignItems:"center",gap:9,marginBottom:13}}>
          <button onClick={back} style={{background:"rgba(255,255,255,.2)",border:"none",color:"#fff",fontWeight:900,fontSize:12,padding:"6px 12px",borderRadius:99,cursor:"pointer",fontFamily:F}}>← メニュー</button>
          <h2 style={{color:"#fff",fontWeight:900,fontSize:17,margin:0}}>✏️ 穴埋め問題</h2>
        </div>
        {rc>0&&<button onClick={()=>start(null,null)} style={{width:"100%",background:"#FFF3CD",border:"3px solid #F59E0B",borderRadius:14,padding:"10px 14px",marginBottom:11,cursor:"pointer",fontFamily:F,display:"flex",alignItems:"center",gap:10}}>
          <span style={{fontSize:22}}>🔁</span><div style={{textAlign:"left"}}><p style={{color:"#92400E",fontWeight:900,fontSize:13,margin:0}}>復習モードで練習する</p><p style={{color:"#B45309",fontSize:11,fontWeight:700,margin:"1px 0 0"}}>{rc}問が復習待ちです</p></div><span style={{marginLeft:"auto",color:"#D97706",fontSize:17}}>→</span>
        </button>}
        <div style={{overflowX:"auto",marginBottom:11,WebkitOverflowScrolling:"touch"}}>
          <div style={{display:"flex",gap:7,width:"max-content",paddingBottom:4}}>
            {Object.entries(UM).map(([key,meta])=>{const a=au===key,h=guc(key)>0;return(
              <button key={key} onClick={()=>{if(h)setAu(key);}} style={{background:a?"#fff":h?"rgba(255,255,255,.18)":"rgba(255,255,255,.07)",border:a?`3px solid ${meta.color}`:`2px solid ${h?"rgba(255,255,255,.35)":"rgba(255,255,255,.15)"}`,borderRadius:14,padding:"9px 11px",cursor:h?"pointer":"default",textAlign:"center",fontFamily:F,minWidth:85,flexShrink:0,opacity:h?1:0.45}}>
                <div style={{fontSize:17,marginBottom:2}}>{meta.emoji}</div>
                <div style={{fontWeight:900,fontSize:11,color:a?meta.color:"#fff",whiteSpace:"nowrap"}}>{meta.label}</div>
                <div style={{fontSize:9,color:a?"#374151":"#D1D5DB",fontWeight:700,lineHeight:1.3,marginBottom:3,maxWidth:78,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{meta.title}</div>
                <div style={{background:a?meta.color:h?"rgba(255,255,255,.35)":"rgba(255,255,255,.15)",color:"#fff",fontSize:9,fontWeight:900,borderRadius:99,padding:"2px 7px",display:"inline-block"}}>{h?`${guc(key)}問`:"準備中"}</div>
              </button>
            );})}
          </div>
        </div>
        <div style={{background:"rgba(255,255,255,.97)",borderRadius:20,padding:"16px 14px",boxShadow:"0 8px 32px rgba(0,0,0,.16)"}}>
          <div style={{display:"flex",alignItems:"center",gap:9,paddingBottom:13,marginBottom:13,borderBottom:"2px solid #F3F4F6"}}>
            <div style={{width:38,height:38,borderRadius:11,background:um.bg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}}>{um.emoji}</div>
            <div><p style={{color:um.color,fontWeight:900,fontSize:14,margin:0}}>{um.label}：{um.title}</p><p style={{color:"#6B7280",fontSize:11,fontWeight:700,margin:"2px 0 0"}}>レベルを選んで練習しよう</p></div>
          </div>
          {um.genres.map(genre=>{const gm=GM[genre];return(
            <div key={genre} style={{marginBottom:13}}>
              {um.genres.length>1&&<div style={{display:"flex",alignItems:"center",gap:6,marginBottom:7}}><span style={{fontSize:15}}>{gm.emoji}</span><span style={{fontWeight:900,fontSize:12,color:gm.color}}>{genre}</span><div style={{flex:1,height:2,background:gm.color,opacity:.18,borderRadius:99}}/></div>}
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:7}}>
                {["Lv1","Lv2","Lv3"].map(level=>{const lm=LM[level],cnt=gc(genre,level),locked=cnt===0;return(
                  <button key={level} disabled={locked} onClick={()=>start(genre,level)}
                    style={{background:locked?"#F9FAFB":lm.bg,border:`2.5px solid ${locked?"#E5E7EB":lm.color}`,borderRadius:13,padding:"9px 5px",cursor:locked?"not-allowed":"pointer",textAlign:"center",opacity:locked?0.45:1,fontFamily:F}}>
                    <div style={{fontFamily:"'Nunito',sans-serif",fontWeight:900,fontSize:16,color:locked?"#9CA3AF":lm.color}}>{lm.label}</div>
                    <div style={{fontSize:9,color:locked?"#9CA3AF":"#374151",fontWeight:700,margin:"2px 0 4px",lineHeight:1.3}}>{um.levelDesc[level]}</div>
                    <div style={{background:locked?"#E5E7EB":lm.color,color:"#fff",fontWeight:900,fontSize:10,borderRadius:99,padding:"2px 7px",display:"inline-block"}}>{locked?"準備中":`${cnt}問`}</div>
                  </button>
                );})}
              </div>
            </div>
          );})}
          <button onClick={()=>start(um.genres.length===1?um.genres[0]:null,null)}
            style={{width:"100%",background:`linear-gradient(90deg,${um.color},${um.color}bb)`,color:"#fff",fontWeight:900,fontSize:13,padding:"12px 0",borderRadius:13,border:"none",cursor:"pointer",fontFamily:F,marginTop:3,boxShadow:`0 4px 14px ${um.color}44`}}>
            {um.emoji} {um.label}の全{guc(au)}問に挑戦！
          </button>
        </div>
        <button onClick={()=>start(null,null)} style={{width:"100%",marginTop:9,background:"rgba(255,255,255,.14)",color:"#fff",fontWeight:900,fontSize:13,padding:"11px 0",borderRadius:13,border:"2px solid rgba(255,255,255,.35)",cursor:"pointer",fontFamily:F}}>
          🚀 全{bank.length}問まとめて挑戦！
        </button>
      </div>
    </div>
  );
  if(sub==="complete"){
    const pct=score.t?Math.round(score.c/score.t*100):0,col=pct>=60?"#059669":"#DC2626";
    return(
      <div style={{minHeight:"100vh",background:"linear-gradient(160deg,#6366F1,#8B5CF6,#EC4899)",fontFamily:F,padding:"20px 16px 40px",overflowY:"auto"}}>
        <style>{G}</style>
        <div className="pop" style={{maxWidth:440,margin:"0 auto",textAlign:"center"}}>
          <div style={{fontSize:70}}>{pct===100?"🏆":pct>=60?"💪":"📖"}</div>
          <h2 style={{fontFamily:"'Nunito',sans-serif",fontWeight:900,fontSize:32,color:"#fff",margin:"0 0 3px"}}>おわり！</h2>
          <div style={{background:"#fff",borderRadius:20,padding:"22px",marginBottom:14,boxShadow:"0 8px 30px rgba(0,0,0,.15)"}}>
            <div style={{fontSize:58,fontWeight:900,color:col,fontFamily:"'Nunito',sans-serif",lineHeight:1}}>{pct}<span style={{fontSize:28}}>%</span></div>
            <p style={{color:"#374151",fontWeight:700,fontSize:15,margin:"5px 0 14px"}}>{score.c} / {score.t} 問正解</p>
            <div style={{height:13,background:"#E5E7EB",borderRadius:99,overflow:"hidden"}}><div style={{height:"100%",width:`${pct}%`,background:col,borderRadius:99,transition:"width 1s"}}/></div>
          </div>
          <div style={{display:"flex",gap:9}}>
            <button onClick={()=>start(sg,sl)} style={{flex:1,background:"#FFD600",color:"#1A1A2E",fontWeight:900,fontSize:14,padding:"14px 0",borderRadius:15,border:"none",cursor:"pointer",fontFamily:F}}>🔄 もう一度</button>
            <button onClick={()=>setSub("home")} style={{flex:1,background:"rgba(255,255,255,.2)",color:"#fff",fontWeight:900,fontSize:14,padding:"14px 0",borderRadius:15,border:"2px solid rgba(255,255,255,.4)",cursor:"pointer",fontFamily:F}}>📚 単元選択</button>
          </div>
          <button onClick={back} style={{width:"100%",marginTop:9,background:"rgba(255,255,255,.1)",color:"rgba(255,255,255,.65)",fontWeight:900,fontSize:13,padding:"11px 0",borderRadius:13,border:"1px solid rgba(255,255,255,.18)",cursor:"pointer",fontFamily:F}}>🏠 メニューへ</button>
        </div>
      </div>
    );
  }
  const q=queue[idx];if(!q)return null;
  const gm=GM[q.genre]||{},lm=LM[q.level]||{},prog=queue.length?(idx/queue.length)*100:0;
  const doSel=opt=>{setSel(opt);setPhase("confirm");};
  const doConf=()=>{
    const ok=sel.correct;const ns={c:score.c+(ok?1:0),t:score.t+1};setScore(ns);setStreak(ok?streak+1:0);setResult(ok?"correct":"wrong");
    if(!ok){setShaking(true);setTimeout(()=>setShaking(false),600);setMist({...mist,[q.id]:Date.now()});}
    else if(mist[q.id]){const l={...mist};delete l[q.id];setMist(l);}setPhase("result");
  };
  const doNext=()=>{
    setShowAll(false);setResult(null);setShowPron(false);
    if(idx+1>=queue.length){addHist({mode:"fill",label:sg||"全問",correct:score.c,total:score.t});setSub("complete");}
    else{setIdx(i=>i+1);setSel(null);setPhase("question");}

              {sg&&<span style={{background:gm.bg,color:gm.color,fontWeight:900,fontSize:10,padding:"2px 8px",borderRadius:99}}>{sg}</span>}
              {sl&&<span style={{background:lm.bg,color:lm.color,fontWeight:900,fontSize:10,padding:"2px 8px",borderRadius:99}}>{lm.label}</span>}
              {rm&&<span style={{background:"#FFF3CD",color:"#92400E",fontSize:10,fontWeight:700,padding:"2px 8px",borderRadius:99}}>🔁 復習</span>}
            </div>
            <div style={{display:"flex",alignItems:"center",gap:6}}>
              {streak>=3&&<span style={{background:"#FF6B35",color:"#fff",fontWeight:900,fontSize:9,padding:"2px 7px",borderRadius:99}}>{streak>=5?"⚡":"🔥"}{streak}連続！</span>}
              <span style={{color:"#C7D2FE",fontWeight:900,fontSize:13,fontFamily:"'Nunito',sans-serif",whiteSpace:"nowrap"}}><span style={{color:"#fff"}}>{idx+1}</span>/{queue.length}</span>

          </div>
          <div style={{height:9,background:"rgba(255,255,255,.25)",borderRadius:99,overflow:"hidden"}}><div style={{height:"100%",width:`${prog}%`,background:"#FFD600",borderRadius:99,transition:"width .5s"}}/></div>
        </div>
      </div>
      <div style={{maxWidth:500,margin:"0 auto",padding:"14px 14px 0"}}>
        <div key={q.id} className={shaking?"shake":"pop"} style={{background:CB[idx%CB.length],border:`3px solid ${gm.color||"#6366F1"}`,borderRadius:20,padding:"18px 20px",marginBottom:14}}>
          <div style={{display:"flex",gap:7,marginBottom:10}}>
            <span style={{background:gm.color||"#6366F1",color:"#fff",fontSize:10,fontWeight:900,padding:"3px 10px",borderRadius:99}}>{q.topic}</span>
            <span style={{background:lm.bg||"#DBEAFE",color:lm.color||"#2563EB",fontSize:10,fontWeight:900,padding:"3px 8px",borderRadius:99}}>{lm.label}</span>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <span style={{fontSize:42,flexShrink:0}}>{q.emoji}</span>
            <div>
              <p style={{color:"#374151",fontWeight:700,fontSize:14,margin:"0 0 7px",lineHeight:1.5}}>{q.sentence}</p>
              <p style={{color:gm.color||"#4F46E5",fontWeight:900,fontSize:22,margin:0,fontFamily:"'Nunito',sans-serif"}}>{q.english}</p>
            </div>
          </div>
          <p style={{color:"#6B7280",fontSize:11,fontWeight:700,margin:"11px 0 0",textAlign:"center"}}>▼ ___ に入る正しい英語を選ぼう！</p>
        </div>
        {phase==="question"&&(
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            {q.options.map((opt,i)=>(
              <button key={opt.id} className="fadeUp" style={{animationDelay:`${i*55}ms`,display:"flex",alignItems:"center",gap:13,background:"#fff",border:`3px solid ${OC[i]}`,borderRadius:16,padding:"13px 16px",cursor:"pointer",fontFamily:F,width:"100%"}} onClick={()=>doSel(opt)}>
                <span style={{background:OC[i],color:"#fff",fontWeight:900,fontSize:13,width:32,height:32,borderRadius:99,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontFamily:"'Nunito',sans-serif"}}>{OL[i]}</span>

            </div>

            <button onClick={()=>{setSel(null);setPhase("question");}} style={{background:"#fff",color:"#6B7280",fontWeight:700,fontSize:13,padding:"11px 0",borderRadius:13,border:"2.5px solid #D1D5DB",cursor:"pointer",fontFamily:F}}>← 選択肢に戻る</button>
          </div>

        {phase==="result"&&(
          <div className="fadeUp" style={{display:"flex",flexDirection:"column",gap:11}}>
            <div style={{background:result==="correct"?"#D1FAE5":"#FEE2E2",border:`3px solid ${result==="correct"?"#059669":"#DC2626"}`,borderRadius:20,padding:"16px",textAlign:"center"}}>

            </div>

              {result==="wrong"&&<div style={{background:"#D1FAE5",border:"2.5px solid #059669",borderRadius:12,padding:"10px 12px",marginBottom:8}}><p style={{color:"#065F46",fontWeight:900,fontSize:13,margin:0}}>✅ 正解：<span style={{fontSize:17,fontFamily:"'Nunito',sans-serif",marginLeft:3}}>{q.options.find(o=>o.correct)?.text}</span></p></div>}
              {q.genre==="代名詞"&&<button onClick={()=>setShowPron(v=>!v)} style={{background:"#EDE9FE",color:"#6D28D9",fontWeight:900,fontSize:11,padding:"8px 0",borderRadius:9,border:"2px solid #C4B5FD",cursor:"pointer",width:"100%",fontFamily:F,marginBottom:7}}>{showPron?"▲ 代名詞変化表を閉じる":"👤 代名詞変化表を見る"}</button>}
              {showPron&&<div style={{marginBottom:8,overflowX:"auto"}}><table style={{width:"100%",borderCollapse:"collapse",fontSize:10}}><thead><tr style={{background:"#6D28D9",color:"#fff"}}>{["","主格","所有格","目的格","所有代名詞"].map((h,i)=><th key={i} style={{padding:"4px 5px",fontWeight:900,fontSize:9}}>{h}</th>)}</tr></thead><tbody>{PT.map((r,i)=><tr key={i} style={{background:i%2===0?"#EDE9FE":"#F5F3FF"}}><td style={{padding:"4px 5px",fontWeight:900,color:"#5B21B6",fontSize:10}}>{r.label}</td>{[r.subj,r.poss,r.obj,r.pp].map((v,j)=><td key={j} style={{padding:"4px 5px",textAlign:"center",fontFamily:"'Nunito',sans-serif",fontWeight:700,fontSize:11}}>{v}</td>)}</tr>)}</tbody></table></div>}
              <button onClick={()=>setShowAll(v=>!v)} style={{background:"#F3F4F6",color:"#374151",fontWeight:700,fontSize:11,padding:"8px 0",borderRadius:9,border:"2px solid #E5E7EB",cursor:"pointer",width:"100%",fontFamily:F}}>{showAll?"▲ 全選択肢の解説を閉じる":"▼ 全選択肢の解説を見る"}</button>
              {showAll&&<div style={{marginTop:9,display:"flex",flexDirection:"column",gap:7}}>{q.options.map((opt,i)=>{const p=parseExp(q.explanation.correct);return(<div key={opt.id} style={{background:opt.correct?"#D1FAE5":"#FEF2F2",border:`2px solid ${opt.correct?"#6EE7B7":"#FECACA"}`,borderRadius:11,padding:"9px 11px"}}><div style={{display:"flex",gap:7,alignItems:"center",marginBottom:3}}><span style={{background:OC[i],color:"#fff",fontWeight:900,fontSize:10,width:20,height:20,borderRadius:99,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{OL[i]}</span><span style={{fontWeight:900,fontSize:13,fontFamily:"'Nunito',sans-serif"}}>{opt.text}</span>{opt.correct&&<span style={{background:"#059669",color:"#fff",fontSize:9,fontWeight:900,padding:"1px 6px",borderRadius:99}}>正解</span>}</div><p style={{color:opt.correct?"#065F46":"#991B1B",fontSize:11,fontWeight:700,margin:"0 0 0 27px",lineHeight:1.6}}>{opt.correct?p._correct:(p[opt.text]||"正解の解説を確認しよう！")}</p></div>);})}</div>}
            </div>
            <button onClick={doNext} style={{background:"#FFD600",color:"#1A1A2E",fontWeight:900,fontSize:16,padding:"15px 0",borderRadius:17,border:"none",cursor:"pointer",fontFamily:F,boxShadow:"0 5px 18px rgba(255,214,0,.45)"}}>{idx+1>=queue.length?"🏁 結果を見る！":"次の問題へ →"}</button>
          </div>
        )}
      </div>
    </div>
  );
}

/* ── Sort Quiz ── */
function SortQuiz({bank,addHist,back}){
  const [sub,setSub]=useState("home");
  const [au,setAu]=useState(Object.keys(UM).find(k=>bank.some(q=>q.unit===k))||"単元1");
  const [queue,setQueue]=useState([]);
  const [idx,setIdx]=useState(0);
  const [phase,setPhase]=useState("question");
  const [arr,setArr]=useState([]);
  const [avail,setAvail]=useState([]);
  const [result,setResult]=useState(null);
  const [score,setScore]=useState({c:0,t:0});
  const [shaking,setShaking]=useState(false);
  const [su,setSu]=useState(null);
  const [sl,setSl]=useState(null);
  const gc=(u,l)=>bank.filter(q=>q.unit===u&&(l?q.level===l:true)).length;
  const initQ=q=>{const all=shuf([...q.answer.filter(w=>w!==","),...q.extra]);setAvail(all.map((w,i)=>({w,id:`av${i}_${Date.now()}`})));setArr([]);};
  const start=useCallback((unit,level)=>{
    let pool=[...bank];if(unit)pool=pool.filter(q=>q.unit===unit);if(level)pool=pool.filter(q=>q.level===level);
    pool=shuf(pool);if(pool.length===0)return;setQueue(pool);setSu(unit);setSl(level);
    setIdx(0);setScore({c:0,t:0});setPhase("question");setResult(null);initQ(pool[0]);setSub("quiz");
  },[bank]);
  useEffect(()=>{if(queue[idx])initQ(queue[idx]);},[idx]);
  const q=queue[idx];
  const tapAv=item=>{setAvail(p=>p.filter(x=>x.id!==item.id));setArr(p=>[...p,item]);};
  const tapArr=item=>{setArr(p=>p.filter(x=>x.id!==item.id));setAvail(p=>[...p,item]);};
  const check=()=>{
    const correct=q.answer.filter(w=>w!==","),ans=arr.map(x=>x.w);
    const ok=ans.length===correct.length&&ans.every((w,i)=>w===correct[i]);
    setResult(ok?"correct":"wrong");if(!ok){setShaking(true);setTimeout(()=>setShaking(false),600);}
    setScore(s=>({c:s.c+(ok?1:0),t:s.t+1}));setPhase("result");
  };
  const next=()=>{
    setResult(null);
    if(idx+1>=queue.length){addHist({mode:"sort",label:su||"全問",correct:score.c,total:score.t});setSub("complete");}
    else{setIdx(i=>i+1);setPhase("question");}
  };
  const um=UM[au]||{};
  if(sub==="home") return(
    <div style={{minHeight:"100vh",background:"linear-gradient(160deg,#064E3B,#059669,#10B981)",fontFamily:F,padding:"16px 16px 32px",overflowY:"auto"}}>
      <style>{G}</style>
      <div style={{maxWidth:480,margin:"0 auto"}}>
        <div style={{display:"flex",alignItems:"center",gap:9,marginBottom:13}}>
          <button onClick={back} style={{background:"rgba(255,255,255,.2)",border:"none",color:"#fff",fontWeight:900,fontSize:12,padding:"6px 12px",borderRadius:99,cursor:"pointer",fontFamily:F}}>← メニュー</button>
          <h2 style={{color:"#fff",fontWeight:900,fontSize:17,margin:0}}>🔀 並べ替え問題</h2>
        </div>
        <div style={{background:"rgba(255,255,255,.12)",borderRadius:12,padding:"9px 13px",marginBottom:13}}>
          <p style={{color:"#fff",fontWeight:700,fontSize:12,margin:0,lineHeight:1.7}}>💡 日本語を見て、英単語をタップして正しい順番に並べよう！<br/>並べた単語をタップすると元に戻せます。</p>
        </div>
        <div style={{overflowX:"auto",marginBottom:11,WebkitOverflowScrolling:"touch"}}>
          <div style={{display:"flex",gap:7,width:"max-content",paddingBottom:4}}>
            {Object.entries(UM).map(([key,meta])=>{const a=au===key,h=bank.some(q=>q.unit===key);return(
              <button key={key} onClick={()=>{if(h)setAu(key);}} style={{background:a?"#fff":h?"rgba(255,255,255,.2)":"rgba(255,255,255,.06)",border:a?"3px solid #059669":"2px solid rgba(255,255,255,.22)",borderRadius:13,padding:"8px 11px",cursor:h?"pointer":"default",textAlign:"center",fontFamily:F,minWidth:80,flexShrink:0,opacity:h?1:0.4}}>
                <div style={{fontSize:15}}>{meta.emoji}</div>
                <div style={{fontWeight:900,fontSize:10,color:a?"#059669":"#fff",whiteSpace:"nowrap"}}>{meta.label}</div>
                <div style={{background:a?"#059669":"rgba(255,255,255,.22)",color:"#fff",fontSize:9,fontWeight:900,borderRadius:99,padding:"2px 7px",display:"inline-block",marginTop:3}}>{h?`${gc(key)}問`:"準備中"}</div>
              </button>
            );})}
          </div>
        </div>
        {bank.some(q=>q.unit===au)&&(
          <div style={{background:"rgba(255,255,255,.95)",borderRadius:18,padding:"14px"}}>
            <div style={{display:"flex",alignItems:"center",gap:9,marginBottom:13}}>
              <span style={{fontSize:22}}>{um.emoji}</span>
              <div><p style={{fontWeight:900,fontSize:13,color:um.color,margin:0}}>{um.label}：{um.title}</p><p style={{color:"#6B7280",fontSize:11,fontWeight:700,margin:"2px 0 0"}}>全{gc(au)}問</p></div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:7,marginBottom:11}}>
              {["Lv1","Lv2","Lv3"].map(level=>{const lm=LM[level],cnt=bank.filter(q=>q.unit===au&&q.level===level).length,locked=cnt===0;return(
                <button key={level} disabled={locked} onClick={()=>start(au,level)}
                  style={{background:locked?"#F9FAFB":lm.bg,border:`2.5px solid ${locked?"#E5E7EB":lm.color}`,borderRadius:13,padding:"9px 5px",cursor:locked?"not-allowed":"pointer",textAlign:"center",opacity:locked?0.4:1,fontFamily:F}}>
                  <div style={{fontFamily:"'Nunito',sans-serif",fontWeight:900,fontSize:15,color:locked?"#9CA3AF":lm.color}}>{lm.label}</div>
                  <div style={{fontSize:9,color:locked?"#9CA3AF":"#374151",fontWeight:700,margin:"2px 0",lineHeight:1.3}}>{um.levelDesc[level]}</div>
                  <div style={{background:locked?"#E5E7EB":lm.color,color:"#fff",fontWeight:900,fontSize:10,borderRadius:99,padding:"2px 7px",display:"inline-block"}}>{locked?"準備中":`${cnt}問`}</div>
                </button>
              );})}
            </div>
            <button onClick={()=>start(au,null)} style={{width:"100%",background:"linear-gradient(90deg,#059669,#10B981)",color:"#fff",fontWeight:900,fontSize:13,padding:"11px 0",borderRadius:13,border:"none",cursor:"pointer",fontFamily:F}}>{um.emoji} {um.label}の全{gc(au)}問に挑戦！</button>
          </div>
        )}
        <button onClick={()=>start(null,null)} style={{width:"100%",marginTop:9,background:"rgba(255,255,255,.15)",color:"#fff",fontWeight:900,fontSize:13,padding:"11px 0",borderRadius:13,border:"2px solid rgba(255,255,255,.32)",cursor:"pointer",fontFamily:F}}>🚀 全{bank.length}問まとめて挑戦！</button>
      </div>
    </div>
  );
  if(sub==="complete"){
    const pct=score.t?Math.round(score.c/score.t*100):0;
    return(
      <div style={{minHeight:"100vh",background:"linear-gradient(160deg,#064E3B,#059669,#10B981)",fontFamily:F,padding:"20px 16px 40px",overflowY:"auto"}}>
        <style>{G}</style>
        <div className="pop" style={{maxWidth:440,margin:"0 auto",textAlign:"center"}}>
          <div style={{fontSize:70}}>{pct===100?"🏆":pct>=60?"💪":"📖"}</div>
          <h2 style={{fontFamily:"'Nunito',sans-serif",fontWeight:900,fontSize:32,color:"#fff",margin:"0 0 3px"}}>おわり！</h2>
          <div style={{background:"#fff",borderRadius:20,padding:"22px",marginBottom:14}}>
            <div style={{fontSize:58,fontWeight:900,color:pct>=60?"#059669":"#DC2626",fontFamily:"'Nunito',sans-serif",lineHeight:1}}>{pct}<span style={{fontSize:28}}>%</span></div>
            <p style={{color:"#374151",fontWeight:700,fontSize:15,margin:"5px 0 14px"}}>{score.c} / {score.t} 問正解</p>
            <div style={{height:13,background:"#E5E7EB",borderRadius:99,overflow:"hidden"}}><div style={{height:"100%",width:`${pct}%`,background:pct>=60?"#059669":"#DC2626",borderRadius:99,transition:"width 1s"}}/></div>
          </div>
          <div style={{display:"flex",gap:9}}>
            <button onClick={()=>start(su,sl)} style={{flex:1,background:"#FFD600",color:"#1A1A2E",fontWeight:900,fontSize:14,padding:"14px 0",borderRadius:15,border:"none",cursor:"pointer",fontFamily:F}}>🔄 もう一度</button>
            <button onClick={()=>setSub("home")} style={{flex:1,background:"rgba(255,255,255,.2)",color:"#fff",fontWeight:900,fontSize:14,padding:"14px 0",borderRadius:15,border:"2px solid rgba(255,255,255,.4)",cursor:"pointer",fontFamily:F}}>📚 単元選択</button>
          </div>
          <button onClick={back} style={{width:"100%",marginTop:9,background:"rgba(255,255,255,.1)",color:"rgba(255,255,255,.65)",fontWeight:900,fontSize:13,padding:"11px 0",borderRadius:13,border:"1px solid rgba(255,255,255,.18)",cursor:"pointer",fontFamily:F}}>🏠 メニューへ</button>
        </div>
      </div>
    );
  }
  if(!q)return null;
  const lm=LM[q.level]||{},um2=UM[q.unit]||{},prog=queue.length?(idx/queue.length)*100:0,correct=q.answer.filter(w=>w!==",");
  return(
    <div style={{minHeight:"100vh",background:"#F0FDF4",fontFamily:F,paddingBottom:40}}>
      <style>{G}</style>
      <div style={{background:"linear-gradient(90deg,#059669,#10B981)",padding:"11px 14px 0"}}>
        <div style={{maxWidth:500,margin:"0 auto"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:9}}>
            <div style={{display:"flex",alignItems:"center",gap:5}}>
              <button onClick={()=>setSub("home")} style={{background:"rgba(255,255,255,.2)",border:"none",color:"#fff",fontWeight:900,fontSize:11,padding:"4px 9px",borderRadius:99,cursor:"pointer",fontFamily:F}}>← 戻る</button>
              {su&&<span style={{background:"rgba(255,255,255,.22)",color:"#fff",fontWeight:900,fontSize:10,padding:"2px 8px",borderRadius:99}}>{um2.label}</span>}
              {sl&&<span style={{background:lm.bg,color:lm.color,fontWeight:900,fontSize:10,padding:"2px 8px",borderRadius:99}}>{lm.label}</span>}
            </div>
            <span style={{color:"rgba(255,255,255,.8)",fontWeight:900,fontSize:13,fontFamily:"'Nunito',sans-serif"}}><span style={{color:"#fff"}}>{idx+1}</span>/{queue.length}</span>
          </div>
          <div style={{height:9,background:"rgba(255,255,255,.25)",borderRadius:99,overflow:"hidden"}}><div style={{height:"100%",width:`${prog}%`,background:"#FFD600",borderRadius:99,transition:"width .5s"}}/></div>
        </div>
      </div>
      <div style={{maxWidth:500,margin:"0 auto",padding:"14px 14px 0"}}>
        <div key={q.id} className={shaking?"shake":"pop"} style={{background:"#fff",border:"3px solid #059669",borderRadius:20,padding:"16px 18px",marginBottom:13}}>
          <div style={{display:"flex",gap:7,marginBottom:9}}>
            <span style={{background:"#059669",color:"#fff",fontSize:10,fontWeight:900,padding:"3px 10px",borderRadius:99}}>{q.topic}</span>
            <span style={{background:lm.bg||"#D1FAE5",color:lm.color||"#059669",fontSize:10,fontWeight:900,padding:"3px 8px",borderRadius:99}}>{lm.label}</span>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:11}}>
            <span style={{fontSize:38,flexShrink:0}}>{q.emoji}</span>
            <div><p style={{color:"#6B7280",fontSize:11,fontWeight:700,margin:"0 0 3px"}}>次の日本語を英語に直しましょう</p><p style={{color:"#1F2937",fontWeight:900,fontSize:19,margin:0,lineHeight:1.4}}>{q.japanese}</p></div>
          </div>
        </div>
        <div style={{background:"#fff",border:"2.5px solid #D1D5DB",borderRadius:16,padding:"13px",marginBottom:11}}>

          <div style={{minHeight:50,background:"#F9FAFB",borderRadius:11,padding:"7px",display:"flex",flexWrap:"wrap",gap:6,marginBottom:12,border:"2px dashed #D1D5DB",alignItems:"center"}}>
            {arr.length===0?<p style={{color:"#9CA3AF",fontSize:12,fontWeight:700,margin:"auto 0"}}>ここに単語が並びます…</p>:
              arr.map(item=><button key={item.id} onClick={()=>{if(phase==="question")tapArr(item);}} style={{background:"#059669",color:"#fff",fontWeight:900,fontSize:14,padding:"6px 12px",borderRadius:9,border:"none",cursor:phase==="question"?"pointer":"default",fontFamily:"'Nunito',sans-serif",boxShadow:"0 2px 7px rgba(5,150,105,.35)"}}>{item.w}</button>)
            }
          </div>
          <p style={{color:"#6B7280",fontSize:11,fontWeight:700,margin:"0 0 7px"}}>📦 選択肢（タップして追加）</p>
          <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
            {avail.map(item=><button key={item.id} onClick={()=>{if(phase==="question")tapAv(item);}} style={{background:"#F3F4F6",color:"#374151",fontWeight:900,fontSize:14,padding:"6px 12px",borderRadius:9,border:"2.5px solid #D1D5DB",cursor:phase==="question"?"pointer":"default",fontFamily:"'Nunito',sans-serif"}}>{item.w}</button>)}
          </div>
        </div>
        {phase==="result"&&(
          <div className="fadeUp" style={{background:result==="correct"?"#D1FAE5":"#FEE2E2",border:`3px solid ${result==="correct"?"#059669":"#DC2626"}`,borderRadius:16,padding:"13px 15px",marginBottom:11}}>
            <p style={{fontWeight:900,fontSize:17,textAlign:"center",color:result==="correct"?"#065F46":"#991B1B",margin:"0 0 7px"}}>{result==="correct"?"🎉 正解！":"😅 不正解…"}</p>
            {result==="wrong"&&<><p style={{color:"#991B1B",fontSize:11,fontWeight:700,margin:"0 0 5px"}}>正しい順番：</p><div style={{display:"flex",flexWrap:"wrap",gap:5}}>{correct.map((w,i)=><span key={i} style={{background:"#059669",color:"#fff",fontWeight:900,fontSize:14,padding:"5px 10px",borderRadius:7,fontFamily:"'Nunito',sans-serif"}}>{w}</span>)}</div></>}
          </div>
        )}
        {phase==="question"&&<button onClick={check} disabled={arr.length===0} style={{width:"100%",background:arr.length>0?"#FFD600":"#E5E7EB",color:arr.length>0?"#1A1A2E":"#9CA3AF",fontWeight:900,fontSize:15,padding:"14px 0",borderRadius:17,border:"none",cursor:arr.length>0?"pointer":"not-allowed",fontFamily:F}}>✅ 答えを確認する</button>}
        {phase==="result"&&<button onClick={next} style={{width:"100%",background:"#FFD600",color:"#1A1A2E",fontWeight:900,fontSize:16,padding:"15px 0",borderRadius:17,border:"none",cursor:"pointer",fontFamily:F,boxShadow:"0 5px 18px rgba(255,214,0,.45)"}}>{idx+1>=queue.length?"🏁 結果を見る！":"次の問題へ →"}</button>}
      </div>
    </div>
  );
}

/* ── Word Quiz ── */
function WordQuiz({bank,wp,saveWP,addHist,back}){
  const [sub,setSub]=useState("level");
  const [sl,setSl]=useState(1);
  const [sm,setSm]=useState(null);
  const [queue,setQueue]=useState([]);
  const [idx,setIdx]=useState(0);
  const [phase,setPhase]=useState("question");
  const [chosen,setChosen]=useState(null);
  const [choices,setChoices]=useState([]);
  const [inp,setInp]=useState("");
  const [result,setResult]=useState(null);
  const [score,setScore]=useState({c:0,t:0});
  const [shaking,setShaking]=useState(false);
  const levels=[...new Set(bank.map(w=>w.level))].sort((a,b)=>a-b);
  const bldC=(q,mode)=>{
    if(mode==="en2ja"){const p=bank.filter(w=>w.japanese!==q.japanese).map(w=>w.japanese);return shuf([q.japanese,...shuf(p).slice(0,3)]);}
    const p=bank.filter(w=>w.english!==q.english).map(w=>w.english);return shuf([q.english,...shuf(p).slice(0,3)]);
  };
  const start=useCallback((level,mode)=>{
    const pool=shuf(bank.filter(w=>w.level===level));setQueue(pool);setSl(level);setSm(mode);
    setIdx(0);setScore({c:0,t:0});setPhase("question");setChosen(null);setInp("");setResult(null);
    if(mode!=="spell"&&pool[0])setChoices(bldC(pool[0],mode));setSub("quiz");
  },[bank]);
  useEffect(()=>{if(queue[idx]&&sm&&sm!=="spell")setChoices(bldC(queue[idx],sm));setChosen(null);setInp("");setResult(null);setPhase("question");},[idx,queue]);
  const q=queue[idx];
  const doConf=()=>{
    if(!q)return;
    let ok=sm==="en2ja"?chosen===q.japanese:sm==="ja2en"?chosen===q.english:inp.trim().toLowerCase()===q.english.toLowerCase();
    setResult(ok?"correct":"wrong");if(!ok){setShaking(true);setTimeout(()=>setShaking(false),600);}
    setScore(s=>({c:s.c+(ok?1:0),t:s.t+1}));setPhase("result");
  };
  const doNext=()=>{
    if(idx+1>=queue.length){
      const pct=score.t?Math.round(score.c/score.t*100):0;
      const np={...wp,[String(sl)]:{pct,sess:(wp[String(sl)]?.sess||0)+1}};saveWP(np);
      addHist({mode:"word",label:`Lv${sl} ${WM.find(m=>m.key===sm)?.label||""}`,correct:score.c,total:score.t});setSub("complete");
    } else setIdx(i=>i+1);
  };
  if(sub==="level") return(
    <div style={{minHeight:"100vh",background:"linear-gradient(160deg,#7F1D1D,#DC2626,#F59E0B)",fontFamily:F,padding:"16px 16px 36px",overflowY:"auto"}}>
      <style>{G}</style>
      <div style={{maxWidth:480,margin:"0 auto"}}>
        <div style={{display:"flex",alignItems:"center",gap:9,marginBottom:14}}>
          <button onClick={back} style={{background:"rgba(255,255,255,.2)",border:"none",color:"#fff",fontWeight:900,fontSize:12,padding:"6px 12px",borderRadius:99,cursor:"pointer",fontFamily:F}}>← メニュー</button>
          <h2 style={{color:"#fff",fontWeight:900,fontSize:17,margin:0}}>📖 単語問題</h2>
        </div>
        <div style={{background:"rgba(255,255,255,.12)",borderRadius:12,padding:"9px 13px",marginBottom:14}}>
          <p style={{color:"#fff",fontWeight:700,fontSize:12,margin:0,lineHeight:1.7}}>📚 Lv1〜20で中学英単語をマスターしよう！<br/>Lv1-5:基本語 / Lv6-10:重要語 / Lv11-15:応用語 / Lv16-20:発展語</p>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:7}}>
          {levels.map(lv=>{
            const p=wp[String(lv)];const col=p?.pct>=80?"#10B981":p?.pct>=60?"#F59E0B":"rgba(255,255,255,.3)";
            return(
              <button key={lv} onClick={()=>{setSl(lv);setSub("mode");}} style={{background:"rgba(255,255,255,.1)",border:`2px solid ${p?col:"rgba(255,255,255,.18)"}`,borderRadius:13,padding:"11px 5px",cursor:"pointer",textAlign:"center",fontFamily:F,position:"relative"}}>
                <div style={{fontFamily:"'Nunito',sans-serif",fontWeight:900,fontSize:18,color:"#fff"}}>Lv{lv}</div>
                <div style={{color:"rgba(255,255,255,.55)",fontSize:10,fontWeight:700}}>{bank.filter(w=>w.level===lv).length}語</div>
                {p&&<div style={{color:col,fontSize:10,fontWeight:900,marginTop:2}}>{p.pct}%</div>}
                {p?.pct>=80&&<div style={{position:"absolute",top:-4,right:-4,fontSize:13}}>🌟</div>}
              </button>
            );
          })}
        </div>
      </div>
    </div>
  );
  if(sub==="mode") return(
    <div style={{minHeight:"100vh",background:"linear-gradient(160deg,#7F1D1D,#DC2626,#F59E0B)",fontFamily:F,padding:"16px 16px 36px",overflowY:"auto"}}>
      <style>{G}</style>
      <div style={{maxWidth:480,margin:"0 auto"}}>
        <div style={{display:"flex",alignItems:"center",gap:9,marginBottom:18}}>
          <button onClick={()=>setSub("level")} style={{background:"rgba(255,255,255,.2)",border:"none",color:"#fff",fontWeight:900,fontSize:12,padding:"6px 12px",borderRadius:99,cursor:"pointer",fontFamily:F}}>← 戻る</button>
          <h2 style={{color:"#fff",fontWeight:900,fontSize:17,margin:0}}>📖 Lv{sl} — モード選択</h2>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:11}}>
          {WM.map(m=>(
            <button key={m.key} onClick={()=>start(sl,m.key)} style={{background:"rgba(255,255,255,.1)",border:"2px solid rgba(255,255,255,.18)",borderRadius:17,padding:"15px 16px",cursor:"pointer",display:"flex",alignItems:"center",gap:13,fontFamily:F,width:"100%",textAlign:"left"}}>
              <div style={{width:46,height:46,borderRadius:13,background:`linear-gradient(135deg,${m.color},${m.color}aa)`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,flexShrink:0}}>{m.emoji}</div>
              <div style={{flex:1}}><p style={{color:"#fff",fontWeight:900,fontSize:15,margin:"0 0 2px",fontFamily:"'Nunito',sans-serif"}}>{m.label}</p><p style={{color:"rgba(255,255,255,.5)",fontSize:11,fontWeight:700,margin:0}}>{m.desc}</p></div>
              <span style={{color:"rgba(255,255,255,.45)",fontSize:20}}>›</span>
            </button>
          ))}
        </div>
      </div>
    </div>
  );
  if(sub==="complete"){
    const pct=score.t?Math.round(score.c/score.t*100):0;
    return(
      <div style={{minHeight:"100vh",background:"linear-gradient(160deg,#7F1D1D,#DC2626,#F59E0B)",fontFamily:F,padding:"20px 16px 40px",overflowY:"auto"}}>
        <style>{G}</style>
        <div className="pop" style={{maxWidth:440,margin:"0 auto",textAlign:"center"}}>
          <div style={{fontSize:70}}>{pct===100?"🏆":pct>=60?"💪":"📖"}</div>
          <h2 style={{fontFamily:"'Nunito',sans-serif",fontWeight:900,fontSize:32,color:"#fff",margin:"0 0 3px"}}>おわり！</h2>
          <div style={{background:"#fff",borderRadius:20,padding:"22px",marginBottom:14}}>
            <div style={{fontSize:58,fontWeight:900,color:pct>=60?"#059669":"#DC2626",fontFamily:"'Nunito',sans-serif",lineHeight:1}}>{pct}<span style={{fontSize:28}}>%</span></div>
            <p style={{color:"#374151",fontWeight:700,fontSize:15,margin:"5px 0 14px"}}>{score.c} / {score.t} 問正解</p>
            <div style={{height:13,background:"#E5E7EB",borderRadius:99,overflow:"hidden"}}><div style={{height:"100%",width:`${pct}%`,background:pct>=60?"#059669":"#DC2626",borderRadius:99,transition:"width 1s"}}/></div>
          </div>
          <div style={{display:"flex",gap:9}}>
            <button onClick={()=>start(sl,sm)} style={{flex:1,background:"#FFD600",color:"#1A1A2E",fontWeight:900,fontSize:14,padding:"13px 0",borderRadius:14,border:"none",cursor:"pointer",fontFamily:F}}>🔄 もう一度</button>
            <button onClick={()=>setSub("mode")} style={{flex:1,background:"rgba(255,255,255,.2)",color:"#fff",fontWeight:900,fontSize:14,padding:"13px 0",borderRadius:14,border:"2px solid rgba(255,255,255,.4)",cursor:"pointer",fontFamily:F}}>📋 モード変更</button>
          </div>
          <button onClick={()=>setSub("level")} style={{width:"100%",marginTop:8,background:"rgba(255,255,255,.1)",color:"rgba(255,255,255,.65)",fontWeight:900,fontSize:13,padding:"11px 0",borderRadius:13,border:"1px solid rgba(255,255,255,.18)",cursor:"pointer",fontFamily:F}}>📚 レベル選択</button>
          <button onClick={back} style={{width:"100%",marginTop:7,background:"rgba(255,255,255,.06)",color:"rgba(255,255,255,.45)",fontWeight:900,fontSize:13,padding:"11px 0",borderRadius:13,border:"1px solid rgba(255,255,255,.1)",cursor:"pointer",fontFamily:F}}>🏠 メニューへ</button>
        </div>
      </div>
    );
  }
  if(!q)return null;
  const mi=WM.find(m=>m.key===sm)||WM[0],prog=queue.length?(idx/queue.length)*100:0;
  const isSpell=sm==="spell",isEn=sm==="en2ja",qWord=isEn?q.english:q.japanese,corrAns=isEn?q.japanese:q.english;
  return(
    <div style={{minHeight:"100vh",background:"#FFF7ED",fontFamily:F,paddingBottom:44}}>
      <style>{G}</style>
      <div style={{background:"linear-gradient(90deg,#DC2626,#F59E0B)",padding:"11px 14px 0"}}>
        <div style={{maxWidth:500,margin:"0 auto"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:9}}>
            <div style={{display:"flex",alignItems:"center",gap:5}}>
              <button onClick={()=>setSub("mode")} style={{background:"rgba(255,255,255,.2)",border:"none",color:"#fff",fontWeight:900,fontSize:11,padding:"4px 9px",borderRadius:99,cursor:"pointer",fontFamily:F}}>← 戻る</button>
              <span style={{background:"rgba(255,255,255,.22)",color:"#fff",fontWeight:900,fontSize:10,padding:"2px 8px",borderRadius:99}}>Lv{sl}</span>
              <span style={{background:"rgba(255,255,255,.18)",color:"#fff",fontWeight:700,fontSize:10,padding:"2px 8px",borderRadius:99}}>{mi.label}</span>
            </div>
            <span style={{color:"rgba(255,255,255,.8)",fontWeight:900,fontSize:13,fontFamily:"'Nunito',sans-serif"}}><span style={{color:"#fff"}}>{idx+1}</span>/{queue.length}</span>
          </div>
          <div style={{height:9,background:"rgba(255,255,255,.25)",borderRadius:99,overflow:"hidden"}}><div style={{height:"100%",width:`${prog}%`,background:"#FFD600",borderRadius:99,transition:"width .5s"}}/></div>
        </div>
      </div>
      <div style={{maxWidth:500,margin:"0 auto",padding:"14px 14px 0"}}>
        <div key={q.id} className={shaking?"shake":"pop"} style={{background:"#fff",border:"3px solid #DC2626",borderRadius:20,padding:"20px",marginBottom:14,textAlign:"center"}}>
          <span style={{background:`linear-gradient(135deg,${mi.color},${mi.color}bb)`,color:"#fff",fontSize:10,fontWeight:900,padding:"3px 11px",borderRadius:99,display:"inline-block",marginBottom:12}}>{mi.emoji} {mi.label}</span>
          <p style={{color:"#6B7280",fontSize:11,fontWeight:700,margin:"0 0 7px"}}>
            {isSpell?"この日本語の英単語を入力してください":isEn?"この英単語の日本語の意味を選んでください":"この日本語に対応する英単語を選んでください"}
          </p>
          <p style={{color:"#1F2937",fontWeight:900,fontSize:26,margin:"0 0 3px",fontFamily:"'Nunito',sans-serif",lineHeight:1.3}}>{qWord}</p>
          {!isEn&&<p style={{color:"#9CA3AF",fontSize:11,fontWeight:700,margin:0}}>品詞：{q.type}</p>}
        </div>
        {!isSpell&&phase==="question"&&(
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            {choices.map((c,i)=>(
              <button key={i} className="fadeUp" style={{animationDelay:`${i*50}ms`,display:"flex",alignItems:"center",gap:13,background:"#fff",border:`3px solid ${OC[i]}`,borderRadius:16,padding:"13px 15px",cursor:"pointer",fontFamily:F,width:"100%"}} onClick={()=>{if(phase==="question"){setChosen(c);setPhase("confirm");}}}>
                <span style={{background:OC[i],color:"#fff",fontWeight:900,fontSize:12,width:30,height:30,borderRadius:99,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontFamily:"'Nunito',sans-serif"}}>{OL[i]}</span>
                <span style={{color:"#111827",fontWeight:900,fontSize:16,fontFamily:"'Nunito',sans-serif"}}>{c}</span>
              </button>
            ))}
          </div>
        )}
        {!isSpell&&phase==="confirm"&&(
          <div className="fadeUp" style={{display:"flex",flexDirection:"column",gap:11}}>
            <div style={{background:"#EDE9FE",border:"3px solid #7C3AED",borderRadius:20,padding:"17px",textAlign:"center"}}>
              <div style={{fontSize:42,marginBottom:7}}>🗣️</div>
              <p style={{color:"#1F2937",fontWeight:900,fontSize:15,margin:"0 0 7px"}}>選んだ答え：<span style={{color:"#7C3AED",fontFamily:"'Nunito',sans-serif",fontSize:17}}>{chosen}</span></p>
              <p style={{color:"#5B21B6",fontWeight:700,fontSize:12,margin:0}}>声に出して覚えてから確認ボタンを押そう！</p>
            </div>
            <button onClick={doConf} style={{background:"#7C3AED",color:"#fff",fontWeight:900,fontSize:15,padding:"14px 0",borderRadius:16,border:"none",cursor:"pointer",fontFamily:F}}>✅ 確認する</button>
            <button onClick={()=>{setChosen(null);setPhase("question");}} style={{background:"#fff",color:"#6B7280",fontWeight:700,fontSize:13,padding:"11px 0",borderRadius:13,border:"2px solid #D1D5DB",cursor:"pointer",fontFamily:F}}>← 選択肢に戻る</button>
          </div>
        )}
        {isSpell&&phase==="question"&&(
          <div className="fadeUp" style={{display:"flex",flexDirection:"column",gap:11}}>
            <div style={{background:"#fff",border:"2.5px solid #D1D5DB",borderRadius:16,padding:"14px"}}>
              <p style={{color:"#6B7280",fontSize:11,fontWeight:700,margin:"0 0 9px"}}>英単語を入力してください（大文字・小文字どちらでも可）</p>
              <input value={inp} onChange={e=>setInp(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&inp.trim())doConf();}} placeholder="英単語を入力…"
                style={{width:"100%",background:"#F9FAFB",border:"2.5px solid #E5E7EB",borderRadius:11,padding:"12px 14px",fontSize:19,fontWeight:700,fontFamily:"'Nunito',sans-serif",outline:"none",color:"#1F2937",letterSpacing:1}}
                autoFocus/>
            </div>
            <button onClick={doConf} disabled={!inp.trim()} style={{background:inp.trim()?"#DC2626":"#E5E7EB",color:inp.trim()?"#fff":"#9CA3AF",fontWeight:900,fontSize:15,padding:"14px 0",borderRadius:16,border:"none",cursor:inp.trim()?"pointer":"not-allowed",fontFamily:F}}>✅ 答える</button>
          </div>
        )}
        {phase==="result"&&(
          <div className="fadeUp" style={{display:"flex",flexDirection:"column",gap:11}}>
            <div style={{background:result==="correct"?"#D1FAE5":"#FEE2E2",border:`3px solid ${result==="correct"?"#059669":"#DC2626"}`,borderRadius:20,padding:"16px",textAlign:"center"}}>
              <div style={{fontSize:50}}>{result==="correct"?"🎉":"😅"}</div>
              <p style={{color:result==="correct"?"#065F46":"#991B1B",fontWeight:900,fontSize:20,margin:"3px 0 7px",fontFamily:"'Nunito',sans-serif"}}>{result==="correct"?"正解！":"不正解…"}</p>
              <div style={{background:"rgba(255,255,255,.55)",borderRadius:13,padding:"11px 14px"}}>
                <p style={{color:"#374151",fontSize:11,fontWeight:700,margin:"0 0 3px"}}>英語</p>
                <p style={{color:"#1F2937",fontWeight:900,fontSize:22,margin:"0 0 7px",fontFamily:"'Nunito',sans-serif"}}>{q.english}</p>
                <p style={{color:"#374151",fontSize:11,fontWeight:700,margin:"0 0 3px"}}>日本語</p>
                <p style={{color:"#374151",fontWeight:900,fontSize:16,margin:0}}>{q.japanese}</p>
              </div>
            </div>
            <button onClick={doNext} style={{background:"#FFD600",color:"#1A1A2E",fontWeight:900,fontSize:16,padding:"15px 0",borderRadius:17,border:"none",cursor:"pointer",fontFamily:F,boxShadow:"0 5px 18px rgba(255,214,0,.45)"}}>{idx+1>=queue.length?"🏁 結果を見る！":"次の問題へ →"}</button>
          </div>
        )}
      </div>
    </div>
  );
}

/* ── 起動 ── */
Promise.all([
  fetch("questions.json").then(r=>r.json()).catch(()=>[]),
  fetch("sort_questions.json").then(r=>r.json()).catch(()=>[]),
  fetch("words.json").then(r=>r.json()).catch(()=>[]),
]).then(([fb,sb,wb])=>{
  ReactDOM.createRoot(document.getElementById("root")).render(<App fillBank={fb} sortBank={sb} wordBank={wb}/>);
}).catch(err=>{
  document.getElementById("root").innerHTML=`<div style="color:red;padding:24px;font-family:sans-serif;max-width:500px;margin:40px auto;"><h2>⚠️ 読み込みエラー</h2><p>以下のファイルをindex.htmlと同じフォルダに置いてください：</p><ul><li>questions.json（穴埋め問題）</li><li>sort_questions.json（並べ替え問題）</li><li>words.json（単語問題）</li></ul><pre>${err}</pre></div>`;
});
</script>
</body>
</html>
